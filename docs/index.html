<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>타르코프 잠수함 패치 한글 해석</title>
  <meta name="description" content="에스케이프 프롬 타르코프의 사일런트(잠수함) 코드 변경을 매일 한글로 번역·해석합니다. 공식 패치노트와 연결되지 않으면 잠수함 패치로 표시합니다." />
  <meta property="og:title" content="타르코프 잠수함 패치 한글 해석" />
  <meta property="og:description" content="EFT 코드 변경을 매일 한글로 해석. 오늘 타르코프는 무엇이 바뀌었나?" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#100f0b" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Bebas+Neue&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-fx" aria-hidden="true">
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-gold"></div>
    <div class="bg-glow bg-glow-teal"></div>
    <div class="bg-vignette"></div>
  </div>
  <div class="topbar" aria-hidden="true"></div>

  <header class="site-header">
    <div class="wrap">
      <div class="brand">
        <span class="brand-mark">🛠️</span>
        <h1>타르코프 잠수함 패치 <span>한글 해석</span></h1>
      </div>
      <p class="tagline">
        에스케이프 프롬 타르코프의 <strong>몰래 바뀐 게임 코드(사일런트 체인지)</strong>를
        매일 한글로 풀어드립니다. 공식 공지와 연결되면 링크를, 아니면
        <span class="sub-badge inline">잠수함 패치</span>로 표시합니다.
      </p>
      <div id="stats" class="stats"></div>
      <div class="meta-row">
        <span id="generated-at" class="muted">불러오는 중…</span>
        <a class="src-link" href="https://changes.tarkov-changes.com/latest" target="_blank" rel="noopener">원본: Tarkov Silent Changes ↗</a>
      </div>
    </div>
  </header>

  <nav class="controls-bar">
    <div class="wrap controls">
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input id="search" type="search" placeholder="검색 (요약·태그·키 경로)" />
      </div>
      <div class="filters">
        <button class="filter active" data-filter="all">전체</button>
        <button class="filter" data-filter="submarine">🌊 잠수함 패치</button>
        <button class="filter" data-filter="linked">🔗 공지 연결됨</button>
        <button class="filter" data-filter="stable">📌 안정 유지</button>
        <button class="filter" data-filter="recurring">🔁 반복 이벤트</button>
      </div>
    </div>
  </nav>

  <main id="feed" class="wrap"></main>

  <footer class="wrap">
    <p class="muted">
      이 사이트는 팬 제작 비공식 프로젝트이며, 해석은 LLM 자동 생성으로 오류가 있을 수 있습니다.
      원본 데이터 출처: <a href="https://changes.tarkov-changes.com/" target="_blank" rel="noopener">tarkov-changes.com</a>.
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
