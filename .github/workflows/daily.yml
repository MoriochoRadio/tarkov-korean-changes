name: 매일 타르코프 변경 해석

on:
  schedule:
    # 매일 UTC 14:00 (= 한국시간 23:00). 필요시 cron 조정.
    - cron: "0 14 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write   # data/ 와 docs/ 변경을 커밋하기 위해 필요
  models: read      # GitHub Models(무료 LLM) 호출에 필요

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 파이프라인 실행 (스크래핑→해석→빌드)
        env:
          # 기본: GitHub Models(무료). GITHUB_TOKEN 은 자동 제공됨.
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'github' }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 유료 제공자로 바꾸고 싶을 때만 아래 Secret 을 등록하세요(선택).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PATCHNOTES_URL: ${{ vars.PATCHNOTES_URL }}
        run: python pipeline.py

      - name: 변경분 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 일일 변경 해석 업데이트 ($(date -u +%Y-%m-%d))"
            git push
          fi
